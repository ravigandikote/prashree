<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Mandala-inspired favicon for PraShree Arts -->
  <circle cx="24" cy="24" r="23" stroke="#000" stroke-width="1.5" fill="white"/>
  <circle cx="24" cy="24" r="16" stroke="#000" stroke-width="1"/>
  <circle cx="24" cy="24" r="9" stroke="#000" stroke-width="0.8"/>
  <circle cx="24" cy="24" r="4" fill="#000"/>
  <!-- Petals -->
  <ellipse cx="24" cy="12" rx="3" ry="6" stroke="#000" stroke-width="0.8" fill="none"/>
  <ellipse cx="24" cy="36" rx="3" ry="6" stroke="#000" stroke-width="0.8" fill="none"/>
  <ellipse cx="12" cy="24" rx="6" ry="3" stroke="#000" stroke-width="0.8" fill="none"/>
  <ellipse cx="36" cy="24" rx="6" ry="3" stroke="#000" stroke-width="0.8" fill="none"/>
  <!-- Diagonal petals -->
  <ellipse cx="15.5" cy="15.5" rx="2.5" ry="5" stroke="#000" stroke-width="0.6" fill="none" transform="rotate(45 15.5 15.5)"/>
  <ellipse cx="32.5" cy="32.5" rx="2.5" ry="5" stroke="#000" stroke-width="0.6" fill="none" transform="rotate(45 32.5 32.5)"/>
  <ellipse cx="32.5" cy="15.5" rx="2.5" ry="5" stroke="#000" stroke-width="0.6" fill="none" transform="rotate(-45 32.5 15.5)"/>
  <ellipse cx="15.5" cy="32.5" rx="2.5" ry="5" stroke="#000" stroke-width="0.6" fill="none" transform="rotate(-45 15.5 32.5)"/>
</svg>
